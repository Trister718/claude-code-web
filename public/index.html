<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Web</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
/* ========== CSS Variables ========== */
:root {
  --bg-primary: #FFFFFF;
  --bg-secondary: #141414;
  --bg-tertiary: #F6F6F6;
  --bg-input: #F0F0F0;
  --text-primary: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-tertiary: #9B9B9B;
  --user-bubble-bg: #D97706;
  --user-bubble-text: #FFFFFF;
  --border-color: #E5E5E5;
  --accent: #D97706;
  --accent-hover: #B45309;
  --code-bg: #1E1E1E;
  --thinking-bg: #F9F9F0;
  --thinking-border: #3B82F6;
  --tool-bg: #FFFBF0;
  --tool-border: #F59E0B;
  --tool-result-bg: #F0FFF4;
  --tool-result-border: #10B981;
  --sidebar-width: 260px;
  --chat-max-width: 768px;
  --font-sans: 'Inter', 'Graphik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
}

.dark {
  --bg-primary: #1A1A1A;
  --bg-secondary: #0F0F0F;
  --bg-tertiary: #2A2A2A;
  --bg-input: #2A2A2A;
  --text-primary: #ECECEC;
  --text-secondary: #9B9B9B;
  --text-tertiary: #6B6B6B;
  --border-color: #333333;
  --thinking-bg: #1E1E24;
  --thinking-border: #3B82F6;
  --tool-bg: #1E1A14;
  --tool-border: #F59E0B;
  --tool-result-bg: #14201A;
  --tool-result-border: #10B981;
  --code-bg: #0D0D0D;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
}

/* ========== Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--bg-primary);
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; height: 100vh; overflow: hidden; }

/* ========== Sidebar ========== */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-secondary);
  color: #ECECEC;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #2A2A2A;
  transition: transform 0.3s, margin-left 0.3s;
  z-index: 100;
}

.sidebar-header {
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #2A2A2A;
}

.sidebar-logo {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff;
  flex-shrink: 0;
}

.sidebar-title { font-size: 14px; font-weight: 600; }

.new-chat-btn {
  margin: 12px;
  padding: 10px 16px;
  background: #2A2A2A;
  border: 1px solid #3A3A3A;
  border-radius: var(--radius-md);
  color: #ECECEC;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.15s;
  font-family: inherit;
}
.new-chat-btn:hover { background: #3A3A3A; }

.conversation-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
}

.conv-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: #B0B0B0;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.15s;
  margin-bottom: 2px;
}
.conv-item:hover { background: #2A2A2A; }
.conv-item.active { background: #333; color: #fff; }

.conv-item-title {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.conv-item-delete {
  opacity: 0; background: none; border: none; color: #999; cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 4px; line-height: 1;
}
.conv-item:hover .conv-item-delete { opacity: 1; }
.conv-item-delete:hover { background: #444; color: #ff6b6b; }

/* ========== Main Chat ========== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-primary);
}

.chat-header {
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-primary);
  flex-shrink: 0;
}

.chat-header-left { display: flex; align-items: center; gap: 8px; }

.menu-btn {
  display: none;
  background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px;
  color: var(--text-primary); border-radius: var(--radius-sm);
}
.menu-btn:hover { background: var(--bg-tertiary); }

.model-badge {
  font-size: 12px; color: var(--text-secondary); background: var(--bg-tertiary);
  padding: 4px 10px; border-radius: 100px; font-weight: 500;
}

.theme-toggle {
  background: none; border: 1px solid var(--border-color); border-radius: var(--radius-sm);
  padding: 6px 12px; cursor: pointer; font-size: 14px; color: var(--text-primary);
  transition: background 0.15s;
}
.theme-toggle:hover { background: var(--bg-tertiary); }

/* ========== Messages Area ========== */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 16px;
}

.messages-inner {
  max-width: var(--chat-max-width);
  margin: 0 auto;
}

/* Welcome screen */
.welcome {
  text-align: center;
  padding: 80px 20px;
}

.welcome-logo {
  width: 56px; height: 56px;
  background: var(--accent);
  border-radius: 14px;
  margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: #fff;
}

.welcome h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.welcome p { color: var(--text-secondary); font-size: 15px; }

/* ========== Message Bubbles ========== */
.msg { margin-bottom: 24px; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.msg-user {
  display: flex; justify-content: flex-end;
}

.msg-user-bubble {
  background: var(--user-bubble-bg);
  color: var(--user-bubble-text);
  padding: 10px 16px;
  border-radius: var(--radius-md);
  max-width: 80%;
  font-size: 14px;
  line-height: 1.5;
}

.msg-assistant { }

.msg-assistant-content {
  font-size: 15px;
  line-height: 1.7;
  word-break: break-word;
}

/* ========== Intermediate Blocks ========== */
.intermediate-blocks { margin-bottom: 12px; }

.think-block, .tool-block {
  margin-bottom: 8px;
  border-radius: var(--radius-sm);
  border-left: 3px solid;
  font-size: 13px;
  overflow: hidden;
}

.think-block {
  background: var(--thinking-bg);
  border-color: var(--thinking-border);
}

.think-block-header, .tool-block-header {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; cursor: pointer; user-select: none;
  font-weight: 500; font-size: 12px;
}

.think-block-header { color: #3B82F6; }
.think-block-body {
  padding: 0 12px 10px;
  color: var(--text-secondary);
  font-style: italic;
  white-space: pre-wrap;
  display: none;
}
.think-block.open .think-block-body { display: block; }

.tool-block {
  background: var(--tool-bg);
  border-color: var(--tool-border);
}
.tool-block.result-ready {
  background: var(--tool-result-bg);
  border-color: var(--tool-result-border);
}

.tool-block-header { color: #B45309; }
.tool-block.result-ready .tool-block-header { color: #059669; }

.tool-block-body {
  padding: 0 12px 10px;
  display: none;
  font-family: var(--font-mono);
  font-size: 12px;
  white-space: pre-wrap;
  color: var(--text-secondary);
  max-height: 300px;
  overflow-y: auto;
}
.tool-block.open .tool-block-body { display: block; }

.tool-block-status {
  font-size: 12px; padding: 4px 12px 8px; color: var(--text-tertiary);
}

.collapse-icon { transition: transform 0.2s; font-size: 10px; }
.think-block.open .collapse-icon, .tool-block.open .collapse-icon { transform: rotate(90deg); }

/* ========== Markdown in Assistant ========== */
.msg-assistant-content h1, .msg-assistant-content h2, .msg-assistant-content h3 {
  margin: 16px 0 8px; font-weight: 600;
}
.msg-assistant-content h1 { font-size: 1.4em; }
.msg-assistant-content h2 { font-size: 1.2em; }
.msg-assistant-content h3 { font-size: 1.05em; }
.msg-assistant-content p { margin: 8px 0; }
.msg-assistant-content ul, .msg-assistant-content ol { padding-left: 24px; margin: 8px 0; }
.msg-assistant-content li { margin: 4px 0; }
.msg-assistant-content a { color: #2563EB; text-decoration: underline; }
.msg-assistant-content strong { font-weight: 600; }
.msg-assistant-content blockquote {
  border-left: 3px solid var(--border-color);
  padding-left: 16px;
  margin: 12px 0;
  color: var(--text-secondary);
}
.msg-assistant-content table {
  border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 14px;
}
.msg-assistant-content th, .msg-assistant-content td {
  border: 1px solid var(--border-color); padding: 8px 12px; text-align: left;
}
.msg-assistant-content th { background: var(--bg-tertiary); font-weight: 600; }

/* Code blocks */
.code-block-wrapper {
  margin: 12px 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
}
.code-block-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px;
  background: #2A2A2A;
  font-size: 11px; font-weight: 500;
  color: #999;
  font-family: var(--font-sans);
}
.code-lang-label { text-transform: lowercase; }
.code-block-wrapper pre {
  background: var(--code-bg);
  border-radius: 0;
  padding: 12px 16px;
  overflow-x: auto;
  margin: 0;
  font-size: 13px;
  line-height: 1.5;
}
.code-block-wrapper pre code {
  font-family: var(--font-mono);
  color: #E2E8F0;
}
.msg-assistant-content pre {
  background: var(--code-bg);
  border-radius: var(--radius-sm);
  padding: 16px;
  overflow-x: auto;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.5;
}
.msg-assistant-content pre code {
  font-family: var(--font-mono);
  color: #E2E8F0;
}
.msg-assistant-content code {
  font-family: var(--font-mono);
  font-size: 0.9em;
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 3px;
}
.msg-assistant-content pre code {
  background: none; padding: 0;
}

.code-copy-btn {
  background: none;
  border: none;
  color: #999;
  cursor: pointer;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-sans);
  transition: all 0.15s;
  opacity: 0;
}
.code-block-wrapper:hover .code-copy-btn { opacity: 1; }
.code-copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.code-copy-btn.copied { color: #10B981; }

/* ========== Input Area ========== */
.input-area {
  flex-shrink: 0;
  padding: 16px 16px 24px;
  background: var(--bg-primary);
}
.input-inner {
  max-width: var(--chat-max-width);
  margin: 0 auto;
  position: relative;
}

.input-wrapper {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 8px 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.1);
}

#messageInput {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  padding: 4px 4px;
  min-height: 24px;
  max-height: 200px;
}
#messageInput::placeholder { color: var(--text-tertiary); }

.send-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  width: 32px; height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.stop-btn {
  background: #EF4444;
  border: none;
  color: #fff;
  padding: 6px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  display: none;
}
.stop-btn.visible { display: block; }

/* ========== Loading ========== */
.loading-dots {
  display: flex; gap: 4px; padding: 12px 0;
}
.loading-dots span {
  width: 6px; height: 6px;
  background: var(--text-tertiary);
  border-radius: 50%;
  animation: dotPulse 1.4s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 60% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* ========== Action Bar ========== */
.msg-actions {
  display: flex; gap: 4px; margin-top: 6px; opacity: 0; transition: opacity 0.2s;
}
.msg:hover .msg-actions { opacity: 1; }
.msg-action-btn {
  background: none; border: 1px solid var(--border-color);
  border-radius: var(--radius-sm); padding: 4px 10px; font-size: 12px;
  cursor: pointer; color: var(--text-secondary); transition: all 0.15s;
}
.msg-action-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

/* ========== Sidebar Overlay (Mobile) ========== */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}
.sidebar-overlay.visible { display: block; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: block; }
  .msg-user-bubble { max-width: 90%; }
}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">C</div>
      <span class="sidebar-title">Claude Code</span>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <div class="conversation-list" id="convList"></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Main Chat -->
  <main class="main">
    <header class="chat-header">
      <div class="chat-header-left">
        <button class="menu-btn" onclick="toggleSidebar()" title="Menu">&#9776;</button>
        <span class="model-badge" id="modelBadge">Loading...</span>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Dark</button>
    </header>

    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner">
        <div class="welcome" id="welcome">
          <div class="welcome-logo">C</div>
          <h1>Claude Code Web</h1>
          <p>Chat with Claude in your browser</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-inner">
        <div class="input-wrapper">
          <textarea id="messageInput" placeholder="Ask Claude anything..." rows="1" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&#8593;</button>
        </div>
        <button class="stop-btn" id="stopBtn" onclick="stopAgent()">Stop generating</button>
      </div>
    </div>
  </main>
</div>

<!-- Dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/auto-render.min.js"></script>

<script>
// ==================== State ====================
let conversations = [];
let activeConvId = null;
let isStreaming = false;
let abortController = null;
let currentTurn = null; // Being built during streaming
let isDark = false;
let currentThinkingStart = null; // timestamp when current thinking block started
let currentThinkingBlockEl = null; // reference to current thinking block DOM element
let markdownRenderTimer = null; // debounce timer for incremental markdown rendering

// DOM refs
const messagesInner = document.getElementById('messagesInner');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const stopBtn = document.getElementById('stopBtn');
const convList = document.getElementById('convList');
const welcome = document.getElementById('welcome');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const modelBadge = document.getElementById('modelBadge');

// ==================== Init ====================
marked.setOptions({
  breaks: true,
  gfm: true,
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

async function init() {
  try {
    const res = await fetch('/api/conversations?_=' + Date.now());
    conversations = await res.json();
  } catch { conversations = []; }
  renderConvList();

  // Load model info
  modelBadge.textContent = 'deepseek-v4-pro';

  // Theme
  const saved = localStorage.getItem('claude-web-theme');
  if (saved === 'dark') { isDark = true; document.body.classList.add('dark'); }
  updateThemeBtn();
}

function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? 'Light' : 'Dark';
}

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  localStorage.setItem('claude-web-theme', isDark ? 'dark' : 'light');
  updateThemeBtn();
}

function toggleSidebar() {
  sidebar.classList.toggle('open');
  sidebarOverlay.classList.toggle('visible');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('visible');
}

// ==================== Conversations ====================
function renderConvList() {
  convList.innerHTML = conversations.map(c => `
    <div class="conv-item${c.id === activeConvId ? ' active' : ''}" onclick="switchConv('${c.id}')">
      <span class="conv-item-title">${escHtml(c.title || 'New Conversation')}</span>
      <button class="conv-item-delete" onclick="event.stopPropagation();deleteConv('${c.id}')">&times;</button>
    </div>
  `).join('') || '<div style="padding:16px;color:#666;font-size:13px;">No conversations yet</div>';
}

async function newChat() {
  if (isStreaming) return;
  closeSidebar();
  try {
    const res = await fetch('/api/conversations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: 'New Conversation' })
    });
    const conv = await res.json();
    conversations.unshift(conv);
    activeConvId = conv.id;
    renderConvList();
    clearMessages();
    messageInput.focus();
  } catch (err) { console.error(err); }
}

async function switchConv(id) {
  if (isStreaming || id === activeConvId) return;
  closeSidebar();
  activeConvId = id;
  renderConvList();

  try {
    const res = await fetch('/api/conversations/' + id + '?_=' + Date.now());
    const conv = await res.json();
    renderMessages(conv.messages || []);
  } catch (err) { console.error(err); }
  messageInput.focus();
}

async function deleteConv(id) {
  try {
    await fetch('/api/conversations/' + id, { method: 'DELETE' });
    conversations = conversations.filter(c => c.id !== id);
    if (activeConvId === id) {
      activeConvId = conversations.length > 0 ? conversations[0].id : null;
      if (activeConvId) {
        switchConv(activeConvId);
      } else {
        clearMessages();
      }
    }
    renderConvList();
  } catch (err) { console.error(err); }
}

function ensureConv() {
  if (!activeConvId) {
    // Create conversation lazily
    const conv = {
      id: 'conv_' + Date.now(),
      title: 'New Conversation',
      messages: [],
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    conversations.unshift(conv);
    activeConvId = conv.id;
    // Save immediately
    fetch('/api/conversations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(conv)
    }).catch(() => {});
    renderConvList();
  }
}

function clearMessages() {
  messagesInner.innerHTML = '';
  welcome.style.display = 'block';
}

function renderMessages(msgs) {
  messagesInner.innerHTML = '';
  welcome.style.display = msgs.length === 0 ? 'block' : 'none';

  // Group messages into turns
  let i = 0;
  while (i < msgs.length) {
    const msg = msgs[i];
    if (msg.role === 'user' && !msg.content.some?.(c => c.type === 'tool_result')) {
      // Regular user message
      const text = extractText(msg.content);
      appendUserMsg(text);
      i++;
    } else if (msg.role === 'user' && msg.content.some?.(c => c.type === 'tool_result')) {
      // Tool results - skip (they were shown during streaming or part of assistant turn)
      i++;
    } else if (msg.role === 'assistant') {
      // Collect the whole assistant turn (text + tool_use), then tool results
      const blocks = [];
      for (const block of (msg.content || [])) {
        if (block.type === 'text' && block.text) {
          blocks.push({ type: 'text', content: block.text });
        } else if (block.type === 'thinking') {
          blocks.push({ type: 'thinking', content: block.thinking || '' });
        } else if (block.type === 'tool_use') {
          // Find corresponding tool result
          let resultContent = '';
          let resultIsError = false;
          if (i + 1 < msgs.length && msgs[i+1].role === 'user') {
            const toolResults = msgs[i+1].content || [];
            const tr = toolResults.find(r => r.tool_use_id === block.id);
            if (tr) {
              resultContent = tr.content || '';
              resultIsError = tr.is_error || false;
            }
          }
          blocks.push({
            type: 'tool_call',
            name: block.name,
            input: block.input,
            result: resultContent,
            isError: resultIsError
          });
        }
      }
      // Skip tool result messages
      while (i + 1 < msgs.length && msgs[i+1].role === 'user' &&
        (msgs[i+1].content || []).some(c => c.type === 'tool_result')) {
        i++;
      }
      appendAssistantBlocks(blocks);
      i++;
    } else {
      i++;
    }
  }
  scrollBottom();
}

function extractText(content) {
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) {
    const textBlock = content.find(c => c.type === 'text');
    return textBlock ? textBlock.text : '';
  }
  return '';
}

// ==================== Build Messages ====================
function appendUserMsg(text) {
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.innerHTML = `<div class="msg-user-bubble">${escHtml(text)}</div>`;
  messagesInner.appendChild(div);
  scrollBottom();
}

function appendAssistantBlocks(blocks) {
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  div.id = 'msg-' + Date.now();

  let html = '';
  const intermediates = blocks.filter(b => b.type !== 'text');
  const textBlock = blocks.find(b => b.type === 'text');

  if (intermediates.length > 0) {
    html += '<div class="intermediate-blocks">';
    for (const block of intermediates) {
      if (block.type === 'thinking') {
        html += renderThinkingBlock(block);
      } else if (block.type === 'tool_call') {
        html += renderToolBlock(block);
      }
    }
    html += '</div>';
  }

  if (textBlock) {
    html += `<div class="msg-assistant-content">${renderMarkdown(textBlock.content)}</div>`;
    html += `<div class="msg-actions">
      <button class="msg-action-btn" onclick="copyText(this)">Copy</button>
    </div>`;
  }

  div.innerHTML = html;
  messagesInner.appendChild(div);
  renderMath(div);
  const content = div.querySelector('.msg-assistant-content');
  if (content) enhanceCodeBlocks(content);
  scrollBottom();
  return div;
}

function getOrCreateAssistantDiv() {
  // Find the last assistant message (current turn)
  let last = messagesInner.lastElementChild;
  if (last && last.classList.contains('msg-assistant') && last.id.startsWith('active-')) {
    return last;
  }
  // Create new
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  div.id = 'active-turn';
  messagesInner.appendChild(div);
  return div;
}

// ==================== Streaming Handlers ====================
function handleStreamEvent(eventType, data) {
  switch (eventType) {
    case 'agent_start':
      currentTurn = { thinking: '', tools: [], text: '' };
      currentThinkingStart = null;
      currentThinkingBlockEl = null;
      break;

    case 'thinking_delta': {
      const div = getOrCreateAssistantDiv();
      let ib = div.querySelector('.intermediate-blocks');
      if (!ib) {
        ib = document.createElement('div');
        ib.className = 'intermediate-blocks';
        div.insertBefore(ib, div.firstChild);
      }
      // Start timing if this is a new thinking block
      if (!currentThinkingStart) {
        currentThinkingStart = Date.now();
      }
      // If the last thinking block is finished, create a new one
      if (currentThinkingBlockEl && currentThinkingBlockEl.classList.contains('finished')) {
        currentThinkingBlockEl = null;
        currentThinkingStart = Date.now();
      }
      let tb = currentThinkingBlockEl;
      if (!tb) {
        tb = document.createElement('div');
        tb.className = 'think-block open';
        tb.innerHTML = `<div class="think-block-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="collapse-icon">&#9654;</span> Thinking...
        </div><div class="think-block-body"></div>`;
        ib.appendChild(tb);
        currentThinkingBlockEl = tb;
      }
      currentTurn.thinking += data.text;
      tb.querySelector('.think-block-body').textContent += data.text;
      scrollBottom();
      break;
    }

    case 'thinking_done': {
      if (currentThinkingBlockEl && currentThinkingStart) {
        const duration = Math.max(0.1, Math.round((Date.now() - currentThinkingStart) / 100) / 10);
        const header = currentThinkingBlockEl.querySelector('.think-block-header');
        if (header) {
          header.innerHTML = `<span class="collapse-icon">&#9654;</span> Thought for ${duration}s`;
        }
        currentThinkingBlockEl.classList.add('finished');
        currentThinkingBlockEl.classList.remove('open');
        currentThinkingBlockEl = null;
        currentThinkingStart = null;
      }
      break;
    }

    case 'tool_call': {
      const div = getOrCreateAssistantDiv();
      let ib = div.querySelector('.intermediate-blocks');
      if (!ib) {
        ib = document.createElement('div');
        ib.className = 'intermediate-blocks';
        div.insertBefore(ib, div.firstChild);
      }
      currentTurn.tools.push({ id: data.id, name: data.name, input: data.input, result: null, isError: false });
      const tb = document.createElement('div');
      const keyParam = toolKeyParam(data.name, data.input);
      const label = keyParam ? `${data.name}(${escHtml(keyParam)})` : data.name;
      tb.className = 'tool-block open';
      tb.id = 'tool-' + data.id;
      tb.dataset.toolName = data.name;
      tb.dataset.toolInput = JSON.stringify(data.input || {});
      tb.innerHTML = `<div class="tool-block-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="collapse-icon">&#9654;</span> ${label}
      </div><div class="tool-block-body">${escHtml(formatToolBody(data.name, data.input, null))}</div>
      <div class="tool-block-status">Executing...</div>`;
      ib.appendChild(tb);
      scrollBottom();
      break;
    }

    case 'tool_result': {
      const tool = currentTurn?.tools?.find(t => t.id === data.tool_use_id);
      if (tool) {
        tool.result = data.content;
        tool.isError = data.isError;
      } else if (data.name && !tool) {
        // tool_call event was missed, add it now
        if (!currentTurn) currentTurn = { thinking: '', tools: [], text: '' };
        currentTurn.tools.push({ id: data.tool_use_id, name: data.name, input: {}, result: data.content, isError: data.isError });
      }
      let tb = document.getElementById('tool-' + data.tool_use_id);
      if (!tb) {
        // Create tool block if it doesn't exist
        const div = getOrCreateAssistantDiv();
        let ib = div.querySelector('.intermediate-blocks');
        if (!ib) {
          ib = document.createElement('div');
          ib.className = 'intermediate-blocks';
          div.insertBefore(ib, div.firstChild);
        }
        tb = document.createElement('div');
        tb.className = 'tool-block open';
        tb.id = 'tool-' + data.tool_use_id;
        tb.dataset.toolName = data.name || 'Tool';
        tb.dataset.toolInput = '{}';
        tb.innerHTML = `<div class="tool-block-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="collapse-icon">&#9654;</span> ${escHtml(data.name || 'Tool')}
        </div><div class="tool-block-body"></div><div class="tool-block-status"></div>`;
        ib.appendChild(tb);
      }
      tb.classList.add('result-ready');
      const body = tb.querySelector('.tool-block-body');
      if (body) body.textContent = data.content || '(empty)';
      const statusEl = tb.querySelector('.tool-block-status');
      if (statusEl) {
        const lines = (data.content || '').split('\n');
        const firstLine = lines[0] || '';
        statusEl.textContent = data.isError ? 'Error' : (firstLine || 'Done');
        statusEl.style.color = data.isError ? '#EF4444' : '#10B981';
      }
      setTimeout(() => tb.classList.remove('open'), 500);
      scrollBottom();
      break;
    }

    case 'text_delta': {
      const div = getOrCreateAssistantDiv();
      currentTurn.text += data.text;
      // Debounce: re-render at most every 80ms instead of on every delta
      if (markdownRenderTimer) clearTimeout(markdownRenderTimer);
      markdownRenderTimer = setTimeout(() => {
        markdownRenderTimer = null;
        let tc = div.querySelector('.msg-assistant-content');
        if (!tc) {
          tc = document.createElement('div');
          tc.className = 'msg-assistant-content';
          div.appendChild(tc);
        }
        tc.innerHTML = renderMarkdown(currentTurn.text);
        renderMath(tc);
        enhanceCodeBlocks(tc);
      }, 80);
      scrollBottom();
      break;
    }

    case 'text_done': {
      // Flush any pending debounced render
      if (markdownRenderTimer) {
        clearTimeout(markdownRenderTimer);
        markdownRenderTimer = null;
        const div = document.getElementById('active-turn');
        if (div) {
          let tc = div.querySelector('.msg-assistant-content');
          if (tc && currentTurn?.text) {
            tc.innerHTML = renderMarkdown(currentTurn.text);
            renderMath(tc);
            enhanceCodeBlocks(tc);
          }
        }
      }
      const doneDiv = document.getElementById('active-turn');
      if (doneDiv) {
        // Add action bar
        const actions = doneDiv.querySelector('.msg-actions');
        if (!actions) {
          const act = document.createElement('div');
          act.className = 'msg-actions';
          act.innerHTML = '<button class="msg-action-btn" onclick="copyText(this)">Copy</button>';
          doneDiv.appendChild(act);
        }
        const content = doneDiv.querySelector('.msg-assistant-content');
        if (content) enhanceCodeBlocks(content);
      }
      break;
    }

    case 'agent_error': {
      // Flush pending render
      if (markdownRenderTimer) {
        clearTimeout(markdownRenderTimer);
        markdownRenderTimer = null;
      }
      currentTurn = null;
      const errDiv = getOrCreateAssistantDiv();
      errDiv.innerHTML += `<div style="color:#EF4444;font-size:13px;margin-top:8px;">Error: ${escHtml(data.message)}</div>`;
      setStreaming(false);
      break;
    }

    case 'agent_done': {
      // Flush pending render
      if (markdownRenderTimer) {
        clearTimeout(markdownRenderTimer);
        markdownRenderTimer = null;
      }
      currentTurn = null;
      const doneDiv2 = document.getElementById('active-turn');
      if (doneDiv2) doneDiv2.id = 'msg-' + Date.now();
      setStreaming(false);
      break;
    }
  }
}

// ==================== Send Message ====================
function buildApiMessages() {
  const msgs = [];
  const children = messagesInner.children;
  let collectingTools = false;
  let toolResultsAcc = [];

  for (const child of children) {
    if (!child.classList) continue;

    if (child.classList.contains('msg-user')) {
      // Flush pending tool results
      if (toolResultsAcc.length > 0) {
        msgs.push({ role: 'user', content: toolResultsAcc });
        toolResultsAcc = [];
      }
      const text = child.querySelector('.msg-user-bubble')?.textContent || '';
      if (text.trim()) {
        msgs.push({ role: 'user', content: text });
      }
      collectingTools = false;
    } else if (child.classList.contains('msg-assistant')) {
      // Build assistant content
      const content = [];
      const textEl = child.querySelector('.msg-assistant-content');
      const text = textEl ? textEl.textContent : '';
      if (text.trim()) content.push({ type: 'text', text });

      // Tool calls
      const toolBlocks = child.querySelectorAll('.tool-block');
      for (const tb of toolBlocks) {
        const name = tb.dataset.toolName;
        if (!name) continue;
        let input = {};
        try { input = JSON.parse(tb.dataset.toolInput || '{}'); } catch {}
        const id = tb.id.replace('tool-', '');
        content.push({ type: 'tool_use', id, name, input });
        // Collect result
        const isReady = tb.classList.contains('result-ready');
        if (isReady) {
          const resultText = tb.querySelector('.tool-block-body')?.textContent || '';
          toolResultsAcc.push({
            type: 'tool_result',
            tool_use_id: id,
            content: resultText,
            is_error: tb.querySelector('.tool-block-status')?.textContent === 'Error'
          });
        }
      }

      if (content.length > 0) {
        msgs.push({ role: 'assistant', content });
      }

      // Flush tool results
      if (toolResultsAcc.length > 0) {
        msgs.push({ role: 'user', content: toolResultsAcc });
        toolResultsAcc = [];
      }
    }
  }

  return msgs;
}

async function sendMessage() {
  if (isStreaming) return;
  const text = messageInput.value.trim();
  if (!text) return;

  ensureConv();
  messageInput.value = '';
  messageInput.style.height = 'auto';
  sendBtn.disabled = true;

  appendUserMsg(text);
  setStreaming(true);

  const messages = buildApiMessages();
  // Add the new user message at the end
  messages.push({ role: 'user', content: text });

  try {
    abortController = new AbortController();
    const res = await fetch('/api/agent/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, conversationId: activeConvId }),
      signal: abortController.signal
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let currentData = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();

      for (const part of parts) {
        const lines = part.split('\n');
        let eventType = '';
        currentData = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) eventType = line.slice(7);
          else if (line.startsWith('data: ')) currentData += line.slice(6);
        }
        if (eventType && currentData) {
          try {
            handleStreamEvent(eventType, JSON.parse(currentData));
          } catch(e) { console.error('SSE handler error:', eventType, e); }
        }
      }
    }

    // Process remaining data
    if (buffer.trim()) {
      const lines = buffer.split('\n');
      let eventType = '';
      currentData = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) eventType = line.slice(7);
        else if (line.startsWith('data: ')) currentData += line.slice(6);
      }
      if (eventType && currentData) {
        try {
          handleStreamEvent(eventType, JSON.parse(currentData));
        } catch(e) { console.error('SSE handler error (final):', eventType, e); }
      }
    }

    // Refresh conversation
    if (activeConvId) {
      try {
        const cres = await fetch('/api/conversations/' + activeConvId + '?_=' + Date.now());
        const cdata = await cres.json();
        renderConvList();
      } catch {}
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      handleStreamEvent('agent_error', { message: err.message });
    }
    setStreaming(false);
  }
}

function stopAgent() {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
  if (activeConvId) {
    fetch('/api/agent/stop/' + activeConvId, { method: 'POST' }).catch(() => {});
  }
  setStreaming(false);
}

function setStreaming(streaming) {
  isStreaming = streaming;
  sendBtn.disabled = streaming;
  stopBtn.classList.toggle('visible', streaming);
  messageInput.disabled = streaming;
  if (!streaming) {
    abortController = null;
    messageInput.focus();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// Auto-resize textarea
messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
});

// ==================== Markdown ====================
function renderMarkdown(text) {
  if (!text) return '';
  try {
    // Pre-process: escape KaTeX to protect from marked
    const katexBlocks = [];
    let processed = text
      .replace(/\$\$([\s\S]*?)\$\$/g, (_, formula) => {
        katexBlocks.push({ type: 'block', formula });
        return `__KATEX_BLOCK_${katexBlocks.length - 1}__`;
      })
      .replace(/\$(.*?)\$/g, (_, formula) => {
        katexBlocks.push({ type: 'inline', formula });
        return `__KATEX_INLINE_${katexBlocks.length - 1}__`;
      });

    // Render markdown
    let html = marked.parse(processed);

    // Restore KaTeX
    html = html.replace(/__KATEX_BLOCK_(\d+)__/g, (_, i) => {
      try {
        return katex.renderToString(katexBlocks[parseInt(i)].formula, { displayMode: true, throwOnError: false });
      } catch { return katexBlocks[parseInt(i)].formula; }
    });
    html = html.replace(/__KATEX_INLINE_(\d+)__/g, (_, i) => {
      try {
        return katex.renderToString(katexBlocks[parseInt(i)].formula, { displayMode: false, throwOnError: false });
      } catch { return katexBlocks[parseInt(i)].formula; }
    });

    return html;
  } catch { return escHtml(text); }
}

function renderMath(el) {
  try {
    renderMathInElement(el, { delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$', right: '$', display: false }
    ], throwOnError: false });
  } catch {}
}

// ==================== Helpers ====================
function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function shortPath(p) {
  const parts = String(p).replace(/\\/g, '/').split('/');
  return parts[parts.length - 1] || p;
}

function truncate(s, n) {
  s = String(s);
  return s.length > n ? s.substring(0, n) + '...' : s;
}

function toolKeyParam(name, input) {
  if (!input || Object.keys(input).length === 0) return null;
  switch (name) {
    case 'Read': return input.file_path ? shortPath(input.file_path) : null;
    case 'Write': return input.file_path ? shortPath(input.file_path) : null;
    case 'Edit': return input.file_path ? shortPath(input.file_path) : null;
    case 'Bash': return input.command ? truncate(input.command, 50) : null;
    case 'Grep': return input.pattern || null;
    case 'Glob': return input.pattern || null;
    case 'WebSearch': return input.query ? truncate(input.query, 40) : null;
    case 'WebFetch': return input.url ? truncate(input.url, 40) : null;
    default: return null;
  }
}

function formatToolBody(name, input, result) {
  if (result != null) return result;
  switch (name) {
    case 'Read': return input.file_path || '';
    case 'Write': return `${input.file_path || '?'}\n\n${truncate(input.content || '', 2000)}`;
    case 'Edit': return `${input.file_path || '?'}\n\n- ${truncate(input.old_string || '', 100)}\n+ ${truncate(input.new_string || '', 100)}`;
    case 'Bash': return input.command || '';
    default: return JSON.stringify(input, null, 2);
  }
}

function scrollBottom(force = false) {
  const container = document.getElementById('messages');
  requestAnimationFrame(() => {
    if (force || isStreaming) {
      // During streaming, only scroll if user is near bottom
      const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
      if (force || atBottom) {
        container.scrollTop = container.scrollHeight;
      }
    } else {
      container.scrollTop = container.scrollHeight;
    }
  });
}

function enhanceCodeBlocks(container) {
  // Wrap bare <pre> blocks (not already in a wrapper) with header + copy button
  const pres = container.querySelectorAll('pre');
  pres.forEach(pre => {
    if (pre.closest('.code-block-wrapper')) return; // Already wrapped

    // Extract language from code class (e.g., "hljs language-python" → "python")
    const code = pre.querySelector('code');
    let lang = '';
    if (code) {
      const cls = code.className || '';
      const m = cls.match(/language-(\w+)/);
      if (m) lang = m[1];
      if (!lang) {
        const m2 = cls.match(/lang-(\w+)/);
        if (m2) lang = m2[1];
      }
    }

    // Create wrapper
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';

    const header = document.createElement('div');
    header.className = 'code-block-header';
    header.innerHTML = `<span class="code-lang-label">${lang || 'code'}</span>`;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'code-copy-btn';
    copyBtn.textContent = 'Copy';
    copyBtn.onclick = () => {
      const codeText = code?.textContent || pre.textContent;
      navigator.clipboard.writeText(codeText).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    };
    header.appendChild(copyBtn);

    // Replace pre with wrapper > header + pre
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(header);
    wrapper.appendChild(pre);
  });
}

// Alias for backward compat
function addCodeCopyButtons(container) { enhanceCodeBlocks(container); }
function addCodeLangLabels(container) { /* language labels handled by enhanceCodeBlocks */ }

function copyText(btn) {
  const msg = btn.closest('.msg-assistant');
  const text = msg?.querySelector('.msg-assistant-content')?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

function renderThinkingBlock(block) {
  const label = block.duration ? `Thought for ${block.duration}s` : 'Thinking...';
  return `<div class="think-block finished">
    <div class="think-block-header" onclick="this.parentElement.classList.toggle('open')">
      <span class="collapse-icon">&#9654;</span> ${label}
    </div>
    <div class="think-block-body">${escHtml(block.content)}</div>
  </div>`;
}

function renderToolBlock(block) {
  const hasResult = block.result != null;
  const inputJson = escHtml(JSON.stringify(block.input || {}));
  const keyParam = toolKeyParam(block.name, block.input);
  const label = keyParam ? `${block.name}(${escHtml(keyParam)})` : block.name;
  return `<div class="tool-block${hasResult ? ' result-ready' : ''}" data-tool-name="${escHtml(block.name)}" data-tool-input="${inputJson}">
    <div class="tool-block-header" onclick="this.parentElement.classList.toggle('open')">
      <span class="collapse-icon">&#9654;</span> ${label}
    </div>
    <div class="tool-block-body">${escHtml((hasResult ? block.result : formatToolBody(block.name, block.input, null)) || '')}</div>
    ${hasResult ? `<div class="tool-block-status" style="color:${block.isError ? '#EF4444' : '#10B981'}">${block.isError ? 'Error' : 'Done'}</div>` : ''}
  </div>`;
}
